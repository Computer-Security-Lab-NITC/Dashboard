<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CTF Dashboard{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='ctf.jpg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0c0f;
      --panel:     #0f1318;
      --border:    #1e2730;
      --accent:    #00ff88;
      --accent2:   #00c8ff;
      --warn:      #ffcc00;
      --danger:    #ff4455;
      --hint:      #b388ff;
      --text:      #c8d8e8;
      --muted:     #4a6070;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 18px;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,255,136,0.05) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,39,48,0.4) 39px, rgba(30,39,48,0.4) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,39,48,0.2) 39px, rgba(30,39,48,0.2) 40px);
    }

        /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.2rem;
      min-height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,12,15,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .nav-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-decoration: none;
    }

    .nav-logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .nav-toggle {
      display: none;
      font-size: 1.4rem;
      color: var(--accent);
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
    }

    .nav-links a.active,
    .nav-links a:hover {
      color: var(--accent);
      background: rgba(0,255,136,0.05);
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .nav-toggle {
        display: block;
      }

      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        padding: 0.8rem 1rem;
        display: none;
      }

      .nav-links.show {
        display: flex;
      }

      .nav-links a {
        padding: 0.7rem 0.3rem;
        border-bottom: 1px solid var(--border);
      }
    }

    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }

    .page-header h1 {
      font-family: var(--mono);
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 0.3rem;
      font-family: var(--mono);
    }

    .flash {
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
      border-radius: 3px;
      margin-bottom: 1.5rem;
      background: rgba(0,255,136,0.08);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-width: 160px;
    }

    label {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.95rem;
      padding: 0.55rem 0.8rem;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 70px; }

    .btn {
      font-family: var(--mono);
      font-size: 0.9rem;
      letter-spacing: 1px;
      padding: 0.55rem 1.2rem;
      border: 1px solid;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      color: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-danger {
      color: var(--danger);
      border-color: var(--danger);
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .footer {
      text-align: center;
      padding: 1rem 1.5rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,12,15,0.95);
    }

    .footer span {
      color: var(--text);
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <img class="nav-logo" src="{{ url_for('static', filename='ctf.jpg') }}" alt="CTF logo" />
    CTF_DASHBOARD
  </a>

  <div class="nav-toggle" onclick="toggleNav()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="/" class="{{ 'active' if request.endpoint == 'index' else '' }}">HOME</a>
    <a href="/announcement" class="{{ 'active' if request.endpoint == 'announcement_page' else '' }}">UPDATES</a>
    <a href="/tools" class="{{ 'active' if request.endpoint == 'tools_page' else '' }}">TOOLS</a>
    <a href="/winners" class="{{ 'active' if request.endpoint == 'winners_page' else '' }}">WINNERS</a>
    <a href="/archives" class="{{ 'active' if request.endpoint == 'archives_page' else '' }}">ARCHIVES</a>
  </div>
</nav>

<div class="wrapper">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash">// {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<footer class="footer">
  <span>Copyright Ⓒ 2026 CSED, National Institute of Technology Calicut</span>
</footer>

<script>
  function toggleNav() {
    document.getElementById("navLinks").classList.toggle("show");
  }
</script>
</body>
</html>
